name: CI

on:
  pull_request:
  push:
    branches: [ main, staging ]

permissions:
  contents: read

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for common Rails security vulnerabilities using static analysis
        run: bin/brakeman --no-pager

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Scan for security vulnerabilities in JavaScript dependencies
        run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Lint code for consistent style
        run: bin/rubocop -f github

  type_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Verify gem RBIs are in sync with Gemfile.lock
        run: bundle exec tapioca gem --verify

      - name: Sorbet static type check
        run: bundle exec srb tc

      # tapioca dsl --verify needs a live Postgres + the schema loaded so Rails
      # can boot and introspect models. Enable this block once a postgres
      # service is added to this job (mirror the pattern from the commented-out
      # `test` job below).
      #
      # - name: Set up test database
      #   env:
      #     RAILS_ENV: test
      #     DATABASE_URL: postgres://postgres:postgres@localhost:5432/heist_test
      #   run: bin/rails db:prepare
      #
      # - name: Verify DSL RBIs are in sync with models
      #   env:
      #     RAILS_ENV: test
      #     DATABASE_URL: postgres://postgres:postgres@localhost:5432/heist_test
      #   run: bundle exec tapioca dsl --verify

  annotate_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Check if annotations are up to date
        run: |
          bundle exec annotaterb models --frozen --show-migration
          bundle exec annotaterb routes --frozen

  deploy:
    # Only deploy on pushes to main (prod) or staging (staging), after CI passes.
    # PRs don't deploy.
    needs: [scan_ruby, scan_js, lint, type_check, annotate_check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Determine target environment
        id: target
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "uuid=usf96zz45j1ht3hadz562bv9" >> "$GITHUB_OUTPUT"
            echo "env_name=production" >> "$GITHUB_OUTPUT"
          else
            echo "uuid=xa3p1q33eryfws2pwqp60sdx" >> "$GITHUB_OUTPUT"
            echo "env_name=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Coolify deploy
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          UUID: ${{ steps.target.outputs.uuid }}
          ENV_NAME: ${{ steps.target.outputs.env_name }}
        run: |
          set -euo pipefail
          echo "::notice::Triggering Coolify deploy for $ENV_NAME (uuid=$UUID, sha=${GITHUB_SHA:0:7})"
          response=$(curl -sS -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "https://coolify.tier3.infra.hackclub.com/api/v1/deploy?uuid=$UUID&force=false")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "Response: $body"
          if [ "$http_code" != "200" ]; then
            echo "::error::Coolify deploy trigger failed with HTTP $http_code"
            exit 1
          fi
          echo "::notice::Deploy queued. Watch progress at https://coolify.tier3.infra.hackclub.com/"

